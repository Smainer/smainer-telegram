<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no, user-scalable=no, viewport-fit=cover">
    <title>⚡ Smainer AI - Test</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body {
            margin: 0;
            padding: 20px;
            background: #1a1a2e;
            color: white;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }
        .container {
            text-align: center;
            max-width: 400px;
            padding: 20px;
            border: 1px solid #333;
            border-radius: 10px;
            background: #16213e;
        }
        h1 { color: #10b981; margin-bottom: 20px; }
        .status { margin: 10px 0; padding: 10px; background: #0f172a; border-radius: 5px; }
    </style>
</head>
<body>
    <div class="container">
        <h1>⚡ Smainer AI</h1>
        <p>Telegram Mini App Test Page</p>
        
        <div class="status" id="status">
            Loading Telegram data...
        </div>
        
        <div class="status">
            <strong>Deployment:</strong> Test Build<br>
            <strong>Time:</strong> <span id="time"></span>
        </div>
    </div>

    <script>
        document.getElementById('time').textContent = new Date().toLocaleString();
        
        // Test Telegram WebApp availability
        if (typeof Telegram !== 'undefined' && Telegram.WebApp) {
            Telegram.WebApp.ready();
            const user = Telegram.WebApp.initDataUnsafe.user;
            document.getElementById('status').innerHTML = 
                `<strong>Telegram Status:</strong> ✅ Connected<br>` +
                `<strong>User:</strong> ${user ? user.first_name : 'Not available'}`;
        } else {
            document.getElementById('status').innerHTML = 
                `<strong>Telegram Status:</strong> ⚠️ Running outside Telegram<br>` +
                `<strong>Mode:</strong> Browser preview`;
        }
    </script>
</body>
</html>
