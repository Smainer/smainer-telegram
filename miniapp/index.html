<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no, user-scalable=no, viewport-fit=cover" />
    <meta name="theme-color" content="#09090B" />
    <meta name="color-scheme" content="dark" />
    
    <!-- Telegram Mini App meta tags -->
    <meta name="telegram-miniapp" content="true" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    
    <title>Smainer</title>
    <meta name="description" content="Private Compute on Starknet — Pay per task in $STRK" />
    
    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    
    <!-- Telegram Web App CSS -->
    <style>
      * {
        box-sizing: border-box;
      }
      
      body {
        margin: 0;
        padding: 0;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', 'Oxygen',
          'Ubuntu', 'Cantarell', 'Fira Sans', 'Droid Sans', 'Helvetica Neue',
          sans-serif;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
        background: var(--tg-theme-bg-color, #ffffff);
        color: var(--tg-theme-text-color, #000000);
        overflow-x: hidden;
      }
      
      #root {
        min-height: 100vh;
        width: 100%;
      }
      
      /* Telegram theme CSS variables */
      :root {
        --tg-bg: var(--tg-theme-bg-color, #09090B);
        --tg-text: var(--tg-theme-text-color, #FAFAFA);
        --tg-hint: var(--tg-theme-hint-color, #71717A);
        --tg-link: var(--tg-theme-link-color, #B5A082);
        --tg-button: var(--tg-theme-button-color, #B5A082);
        --tg-button-text: var(--tg-theme-button-text-color, #000000);
        --tg-secondary-bg: var(--tg-theme-secondary-bg-color, #111111);
        --tg-header-bg: var(--tg-theme-header-bg-color, #B5A082);
        --tg-accent: var(--tg-theme-accent-text-color, #B5A082);
        --tg-section-bg: var(--tg-theme-section-bg-color, #111111);
        --tg-section-header: var(--tg-theme-section-header-text-color, #22D3EE);
        --tg-subtitle: var(--tg-theme-subtitle-text-color, #71717A);
        --tg-destructive: var(--tg-theme-destructive-text-color, #EF4444);
        --tg-separator: var(--tg-theme-section-separator-color, #27272A);
        
        /* Smainer brand colors */
        --smainer-champagne: #B5A082;
        --smainer-champagne-dark: #8A7563;
        --smainer-cyan: #22D3EE;
      }
    </style>
    <!-- Telegram WebApp SDK loaded async to avoid blocking render -->
    <script src="https://telegram.org/js/telegram-web-app.js" async></script>
  </head>
  <body>
    <div id="root">
      <!-- Premium loading state before JS mounts -->
      <div id="js-loading" style="min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;background:#09090B;color:#FAFAFA;font-family:'Inter',system-ui,sans-serif;padding:32px;">
        <div style="width:64px;height:64px;border:1px solid rgba(181,160,130,0.2);background:#111111;border-radius:16px;display:flex;align-items:center;justify-content:center;margin-bottom:24px;">
          <div style="font-size:28px;color:#B5A082;font-family:'JetBrains Mono',monospace;font-weight:700;">S</div>
        </div>
        <div style="font-size:24px;font-weight:700;margin-bottom:8px;font-family:'JetBrains Mono',monospace;letter-spacing:-0.02em;">SMAINER</div>
        <div style="font-size:14px;color:#A1A1AA;margin-bottom:24px;">Loading premium interface...</div>
        <div style="display:flex;gap:4px;">
          <div style="width:8px;height:8px;border-radius:50%;background:#B5A082;animation:pulse 2s infinite;"></div>
          <div style="width:8px;height:8px;border-radius:50%;background:#B5A082;animation:pulse 2s infinite;animation-delay:0.2s;"></div>
          <div style="width:8px;height:8px;border-radius:50%;background:#B5A082;animation:pulse 2s infinite;animation-delay:0.4s;"></div>
        </div>
        <style>
          @keyframes pulse {
            0%, 100% { opacity: 0.4; }
            50% { opacity: 1; }
          }
        </style>
        <noscript>
          <p style="margin-top:32px;color:#EF4444;font-size:14px;">JavaScript is required. Please enable it and reload.</p>
        </noscript>
      </div>
    </div>
    <script type="module" src="/src/main.tsx" onerror="document.getElementById('js-loading').innerHTML='<div style=\'padding:24px;color:#f87171;font-family:system-ui;\'>App failed to load. <a href=\'/connect\' style=\'color:#a78bfa;\'>Use this link instead</a></div>'"></script>
  </body>
</html>
